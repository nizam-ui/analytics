version: 2

models:
  - name: stg_employees
    columns:
      - name: first_name
        tests:
          - not_null

      - name: email
        tests:
          - unique
      
      - name: employee_id
        tests:
          - unique
          - not_null

      - name: gender
        tests:
          - accepted_values:
              values: ['M','F','T']