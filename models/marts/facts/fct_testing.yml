version: 2

models:
  - name: fct_order_items
    description: Fact table containing product-level order transaction details.
    columns:
      - name: order_item_key
        description: Unique key for each order item transaction.
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null

      - name: customer_key
        tests:
          - not_null

      - name: product_key
        tests:
          - not_null

      - name: quantity
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null

      - name: source_audit_datetime
        tests:
          - not_null

  - name: fct_orders
    description: Fact table containing order-level transaction summary.
    columns:
      - name: order_key
        description: Unique key for each order.
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null

      - name: customer_key
        tests:
          - not_null

      - name: grand_total
        tests:
          - not_null

      - name: source_audit_datetime
        tests:
          - not_null

  - name: fct_payments
    description: Fact table containing payment transaction details.
    columns:
      - name: payment_key
        description: Unique key for each payment.
        tests:
          - not_null
          - unique

      - name: payment_id
        tests:
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: amount
        tests:
          - not_null

      - name: payment_status
        tests:
          - not_null

      - name: source_audit_datetime
        tests:
          - not_null